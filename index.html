<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK Inventory</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">

  <meta name="theme-color" content="#e91e63">
</head>

<body>

<header class="topbar">
    <button class="backBtn">← Dashboard</button>

    <h1>📦 Bundle - A</h1>

    <button class="bundleBtn">Change Bundle</button>
</header>

<main>

<section class="dashboard">

<div class="card">
<h3>Total Items</h3>
<h2 id="totalItems">0</h2>
</div>

<div class="card">
<h3>Sold Items</h3>
<h2 id="soldItems">0</h2>
</div>

<div class="card">
<h3>Remain Items</h3>
<h2 id="remainItems">0</h2>
</div>

<div class="card">
<h3>Total Cost</h3>
<h2 id="totalCost">0 Ks</h2>
</div>

<div class="card">
<h3>Total Sale</h3>
<h2 id="totalSale">0 Ks</h2>
</div>

<div class="card">
<h3>Total Profit</h3>
<h2 id="totalProfit">0 Ks</h2>
</div>

</section>

<section class="content">

<div class="leftPanel">

<h2>Add New Item</h2>

<input id="code" placeholder="Item Code">

<input id="cost" type="number" placeholder="Cost Price">

<input id="sale" type="number" placeholder="Selling Price">

<button id="saveBtn">
💾 Save Item
</button>

</div>

<div class="rightPanel">

<h2>Search Item</h2>

<input id="search" placeholder="Search...">

<table id="itemTable">
    <thead>
        <tr>
            <th>No</th>
            <th>Code</th>
            <th>Cost</th>
            <th>Sale</th>
            <th>Profit</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="items">
    </tbody>
</table>

</div>

</section>

</main>

<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/bundle.js"></script>
<script src="js/app.js"></script>

</body>
</html>
